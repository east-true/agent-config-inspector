name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/agent-config-inspector
      - run: go run ./cmd/agent-config-inspector verify .
      - run: bash -n scripts/build-release.sh scripts/run-action.sh
